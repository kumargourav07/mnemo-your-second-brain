services:
  - type: web
    name: mnemo-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DB_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: mnemo-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_URL
        value: https://mnemo-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
